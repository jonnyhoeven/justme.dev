name: Deployment

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Scoped concurrency: cancel running PR builds but allow main branch builds to complete.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache npm store
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install Nix & Setup Cache
        uses: DeterminateSystems/determinate-nix-action@v3
        with:
          flake-hub: false

      - name: Lint with Ruff
        run: nix develop .#ci --command ruff check .

      - name: Generate content
        run: nix develop .#ci --command python3 scripts/process_requests.py

      - name: Generate splats
        run: nix develop .#ci --command npm run docs:generate-splats

      - name: Commit and push content changes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: auto-generate content [skip ci]"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Install npm dependencies
        run: nix develop .#ci --command npm ci

      - name: Build with VitePress
        run: nix develop .#ci --command npm run docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: .vitepress/dist

  # Deployment job
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
