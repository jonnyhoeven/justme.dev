name: Deployment

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Scoped concurrency: cancel running PR builds but allow main branch builds to complete.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REQUEST_PATH: openai/request
  API_URL: https://api.aimlapi.com/
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@f82c148f7301cb707b22a613247071f760e90c64 # v5.3.0
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with Ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Generate content
        run: |
          python generate/process.py

      - name: Commit and push content changes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: auto-generate content [skip ci]"
          git push

      - name: Setup Node
        uses: actions/setup-node@1d3c081ec7d1872535035f8a0029b4e7ed91000b # v4.1.0
        with:
          node-version: 22
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@1f0c5cde4bc08d3e23276cd84236a2879f727c65 # v5.0.0

      - name: Install dependencies
        run: npm ci

      - name: Lint with ESLint
        run: npx eslint . # Avoid --fix in CI

      - name: Build with VitePress
        run: npm run docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@20999eed9211c13bc54157fc88a10174ca68019a # v3.1.2
        with:
          path: .vitepress/dist

  # Deployment job
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e05e26978413158c # v4.0.5