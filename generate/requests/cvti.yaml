intro: CVTI (Camera & Visual Touch Interface) is an enterprise-grade Facility Automation & IoT Orchestration Platform
  designed for high-reliability environments. It functions as a centralized Edge Controller, unifying the management of
  PTZ surveillance systems, DMX lighting protocols, and mechanical infrastructure (hatches) into a secure,
  touch-optimized interface. Built on the .NET Framework for deep Windows OS integration,
  it ensures operational continuity through robust error handling, self-healing network connectivity,
  and strict access control policies.
