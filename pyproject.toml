[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=scripts --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["scripts"]
omit = []

[tool.coverage.report]
fail_under = 80
show_missing = true
